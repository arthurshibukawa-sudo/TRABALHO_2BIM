<title>Portal - MindUp</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* Cabeçalho */
header h1{
    margin:0;
}

/* Logo e título */
.center{
    margin-left:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:20px;
}

/* Menu lateral */
nav{
    position:fixed;
    top:0;
    left:0;
    width:200px;
    height:100vh;
    background-color:#a1c9e0;
    padding-top:50px;
}

/* Título do menu */
nav h2{
    text-align:center;
    color:rgb(30, 56, 85);
}

/* Links */
nav a{
    display:block;
    color:rgb(30, 56, 85);
    text-decoration:none;
    padding:15px;
}

nav a:hover{
    background-color:#8bb8d3;
}
</style>

</head>

        <img src="imagens/Favicon.jpg" alt="logo" width="50">
